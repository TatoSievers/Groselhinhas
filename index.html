<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="app-version" content="2408.1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groselhinhas - Seu Guia de Filmes e Séries</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-accent': '#f59e0b', // amber-500
              'brand-background': '#111827', // gray-900
              'brand-surface': '#1f2937', // gray-800
              'brand-muted': '#4b5563', // gray-600
            },
          },
        },
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      /* Custom scrollbar for trending section */
      .scrollbar-thin::-webkit-scrollbar {
          height: 8px;
          width: 8px;
      }
      .scrollbar-thin::-webkit-scrollbar-track {
          background: transparent;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb {
          background-color: #4b5563; /* brand-muted */
          border-radius: 10px;
          border: 2px solid transparent;
          background-clip: content-box;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb:hover {
          background-color: #6b7280; /* gray-500 */
      }
      /* Custom styles for details/summary accordion */
      details > summary {
        list-style: none; /* Remove default marker */
      }
      details > summary::-webkit-details-marker {
        display: none; /* Remove default marker in Safari */
      }
      /* Styles for new collapsible filter panel on mobile */
      .collapsible-panel {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.5s ease-in-out;
      }
      .collapsible-panel.open {
        max-height: 1500px; /* A large enough value to show all content */
      }
      /* Animation for update popup */
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fade-in-up 0.3s ease-out;
      }

      /* Custom styles for range input */
      input[type=range].styled-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 8px;
        background: #4b5563; /* brand-muted */
        border-radius: 5px;
        outline: none;
        opacity: 0.7;
        transition: opacity .2s;
      }
      input[type=range].styled-slider:hover {
        opacity: 1;
      }
      input[type=range].styled-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        background: #f59e0b; /* brand-accent */
        cursor: pointer;
        border-radius: 50%;
        border: 2px solid #1f2937; /* brand-surface */
      }
      input[type=range].styled-slider::-moz-range-thumb {
        width: 20px;
        height: 20px;
        background: #f59e0b; /* brand-accent */
        cursor: pointer;
        border-radius: 50%;
        border: 2px solid #1f2937; /* brand-surface */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "@google/genai": "https://esm.sh/@google/genai?bundle"
  }
}
</script>
</head>
  <body class="bg-brand-background text-gray-200 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
